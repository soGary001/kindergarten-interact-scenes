name: build
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: npm ci
      # No asset generation in CI: content.json + audio are committed,
      # so the API key NEVER enters CI and both OS builds ship identical content.
      - name: Build app
        uses: tauri-apps/tauri-action@v0
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - name: Install deps
        run: npm ci
      - name: Point Tauri at the runner's preinstalled NDK
        run: echo "NDK_HOME=$ANDROID_NDK_ROOT" >> "$GITHUB_ENV"
      - name: Initialize the Android project
        run: npm run tauri android init -- --ci
      - name: Build debug APK (auto-signed with the debug key, installable)
        run: npm run tauri android build -- --debug --apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
