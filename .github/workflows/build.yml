name: build
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: npm ci
      # Native apps capture the mic with cpal and stream to Alibaba's realtime ASR
      # directly; the key is embedded (obfuscated) at build time via build.rs.
      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - name: Install deps
        run: npm ci
      - name: Point Tauri at the runner's preinstalled NDK
        run: echo "NDK_HOME=$ANDROID_NDK_ROOT" >> "$GITHUB_ENV"
      - name: Initialize the Android project
        run: npm run tauri android init -- --ci
      - name: Add RECORD_AUDIO permission to the Android manifest
        run: |
          M=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          grep -q RECORD_AUDIO "$M" || sed -i 's#<application#<uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <application#' "$M"
          echo "--- manifest perms ---"; grep -n "uses-permission\|<application" "$M" | head
      - name: Build release APK (universal, stripped/optimized, unsigned)
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: npm run tauri android build -- --apk
      - name: Sign the APK with a generated key (installable; internal use)
        run: |
          set -euo pipefail
          UNSIGNED=$(find src-tauri/gen/android -name "*-release-unsigned.apk" | head -1)
          echo "Unsigned APK: $UNSIGNED"
          keytool -genkeypair -v -keystore "$RUNNER_TEMP/ks.jks" -alias efk -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=English Fun Time, OU=Kindergarten, O=Kindergarten, L=NA, ST=NA, C=CN"
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          echo "build-tools: $BT"
          mkdir -p dist-apk
          "$BT/zipalign" -f 4 "$UNSIGNED" "$RUNNER_TEMP/aligned.apk"
          "$BT/apksigner" sign --ks "$RUNNER_TEMP/ks.jks" --ks-pass pass:android --key-pass pass:android \
            --out "dist-apk/English-Fun-Time_0.1.0.apk" "$RUNNER_TEMP/aligned.apk"
          "$BT/apksigner" verify "dist-apk/English-Fun-Time_0.1.0.apk"
          ls -lh dist-apk/
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist-apk/*.apk
